name: Security Audit

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1' # Weekly on Mondays at 03:00 UTC

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (moderate+)
        run: npm audit --audit-level=moderate || true

      - name: Report audit summary
        run: |
          echo "Audit completed. Review logs above for any issues."
