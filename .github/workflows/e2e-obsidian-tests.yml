name: Experimental E2E Obsidian Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/e2e-obsidian/**'
      - 'jest.e2e-obsidian.config.js'
      - 'package.json'
      - '.github/workflows/e2e-obsidian-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/e2e-obsidian/**'
      - 'jest.e2e-obsidian.config.js'
      - 'package.json'
  workflow_dispatch:
    inputs:
      test_pattern:
        description: 'Test pattern to run (optional)'
        required: false
        default: ''
      debug_mode:
        description: 'Enable debug mode'
        type: boolean
        required: false
        default: false

env:
  NODE_VERSION: '18'
  FORCE_COLOR: 1
  CI: true

jobs:
  e2e-obsidian-tests:
    runs-on: ubuntu-latest
    name: Experimental E2E Tests (jest-environment-obsidian)
    continue-on-error: true
    
    strategy:
      matrix:
        test-suite:
          - UniversalLayout
          - DynamicLayout  
          - CreateAssetModal
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install system dependencies for headless testing
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libgbm-dev \
            libxss1 \
            libasound2 \
            fonts-liberation \
            libappindicator3-1 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libnss3 \
            libxss1 \
            libgconf-2-4

      - name: Install dependencies
        run: |
          npm ci
          npm list jest-environment-obsidian || (echo "jest-environment-obsidian not found" && exit 1)

      - name: Verify test environment setup
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Jest config exists: $(test -f jest.e2e-obsidian.config.js && echo 'YES' || echo 'NO')"
          echo "Test files exist:"
          find tests/e2e-obsidian -name "*.test.ts" || echo "No test files found"

      - name: Setup virtual display
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          echo "XVFB_PID=$!" >> $GITHUB_ENV
          sleep 3
          echo "Virtual display started on :99"

      - name: Run experimental E2E test suite
        continue-on-error: true
        env:
          DISPLAY: :99
          NODE_ENV: test
        run: |
          TEST_PATTERN="${{ matrix.test-suite }}"
          if [[ "${{ github.event.inputs.test_pattern }}" != "" ]]; then
            TEST_PATTERN="${{ github.event.inputs.test_pattern }}"
          fi
          
          echo "🧪 EXPERIMENTAL: Running E2E tests with pattern: $TEST_PATTERN (non-blocking)"
          
          # Run tests with error handling - always succeed
          if [[ "${{ github.event.inputs.debug_mode }}" == "true" ]]; then
            if npm run test:e2e-obsidian -- --testNamePattern="$TEST_PATTERN" --verbose --detectOpenHandles; then
              echo "✅ Experimental E2E tests ($TEST_PATTERN) completed successfully"
            else
              echo "⚠️ Experimental E2E tests ($TEST_PATTERN) completed with issues (non-blocking)"
            fi
          else
            if npm run test:e2e-obsidian -- --testNamePattern="$TEST_PATTERN"; then
              echo "✅ Experimental E2E tests ($TEST_PATTERN) completed successfully"
            else
              echo "⚠️ Experimental E2E tests ($TEST_PATTERN) completed with issues (non-blocking)"
            fi
          fi
          
          # Always exit successfully for experimental tests
          exit 0

      - name: Generate experimental test report
        if: always()
        continue-on-error: true
        run: |
          echo "## 🧪 Experimental E2E Test Results (${{ matrix.test-suite }})" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Note**: These are experimental tests that do not block CI/CD pipeline." >> $GITHUB_STEP_SUMMARY
          if [[ -f "test-results/e2e-obsidian-results.xml" ]]; then
            echo "Experimental test results found, processing..." >> $GITHUB_STEP_SUMMARY
          else
            echo "No experimental test results file found (this is expected)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "✅ **Test is experimental and does not affect CI success**" >> $GITHUB_STEP_SUMMARY

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-obsidian-test-results-${{ matrix.test-suite }}
          path: |
            test-results/
            jest-coverage/
            *.log
          retention-days: 7

      - name: Cleanup virtual display
        if: always()
        run: |
          if [[ "$XVFB_PID" != "" ]]; then
            kill $XVFB_PID || true
            echo "Virtual display stopped"
          fi

  docker-e2e-tests:
    runs-on: ubuntu-latest
    name: Experimental Docker E2E Tests
    needs: e2e-obsidian-tests
    if: always()
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and run experimental E2E tests in Docker
        continue-on-error: true
        run: |
          echo "🧪 EXPERIMENTAL: Building Docker image for E2E tests (non-blocking)..."
          
          if docker compose -f docker-compose.e2e-obsidian.yml build; then
            echo "✅ Docker image built successfully"
          else
            echo "⚠️ Docker image build had issues (non-blocking)"
          fi

          echo "🧪 EXPERIMENTAL: Running E2E tests in Docker (non-blocking)..."
          if docker compose -f docker-compose.e2e-obsidian.yml up --abort-on-container-exit; then
            echo "✅ Experimental Docker E2E tests completed"
          else
            echo "⚠️ Experimental Docker E2E tests had issues (non-blocking)"
          fi
          
          # Always exit successfully for experimental tests
          exit 0

      - name: Extract test results from Docker
        if: always()
        run: |
          # Copy test results from Docker volume
          docker compose -f docker-compose.e2e-obsidian.yml cp e2e-obsidian-tests:/app/test-results ./docker-test-results/ || true
          
          # Show container logs
          echo "## Docker Container Logs" >> $GITHUB_STEP_SUMMARY
          docker compose -f docker-compose.e2e-obsidian.yml logs >> $GITHUB_STEP_SUMMARY || true

      - name: Upload Docker test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-e2e-test-results
          path: |
            docker-test-results/
            docker-compose.logs
          retention-days: 7

      - name: Cleanup Docker
        if: always()
        run: |
          docker compose -f docker-compose.e2e-obsidian.yml down -v || true
          docker system prune -f || true

  results-summary:
    runs-on: ubuntu-latest
    name: Experimental Test Results Summary
    needs: [e2e-obsidian-tests, docker-e2e-tests]
    if: always()
    continue-on-error: true

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-test-results

      - name: Generate experimental comprehensive summary
        continue-on-error: true
        run: |
          echo "# 🧪 Experimental E2E Obsidian Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Note**: These are experimental tests that do not block CI/CD pipeline." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Matrix tests results
          echo "## Experimental Matrix Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          
          echo "| UniversalLayout | 🧪 Experimental |" >> $GITHUB_STEP_SUMMARY
          echo "| DynamicLayout | 🧪 Experimental |" >> $GITHUB_STEP_SUMMARY  
          echo "| CreateAssetModal | 🧪 Experimental |" >> $GITHUB_STEP_SUMMARY
          
          # Docker tests results
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Experimental Docker Test Results" >> $GITHUB_STEP_SUMMARY
          echo "🧪 Experimental Docker E2E tests completed (non-blocking)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All tests are experimental and do not affect CI success**" >> $GITHUB_STEP_SUMMARY
          
          # Test artifacts summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Artifacts" >> $GITHUB_STEP_SUMMARY
          find all-test-results -type f -name "*.log" -o -name "*.xml" -o -name "*.json" | head -10 | while read file; do
            echo "- \`$(basename "$file")\`" >> $GITHUB_STEP_SUMMARY
          done

      - name: Check experimental test status
        continue-on-error: true
        run: |
          echo "🧪 EXPERIMENTAL: All E2E Obsidian tests completed (non-blocking)"
          echo "Matrix tests result: ${{ needs.e2e-obsidian-tests.result }}"
          echo "Docker tests result: ${{ needs.docker-e2e-tests.result }}"
          echo "✅ All experimental tests are non-blocking and do not affect CI success"
          
          # Always exit successfully for experimental tests
          exit 0